<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#05060A"/>
    <title>Daily Evolution</title>

    <!-- iOS PWA 防護標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        ink: "#05060A",
                        obsidian: "#0B0D14",
                        surface: "#0F1424",
                        panel: "#10192E",
                        stroke: "rgba(255,255,255,0.10)",
                        stroke2: "rgba(255,255,255,0.14)",
                        gold: "#D4AF37",
                        gold2: "#F4E09A",
                        violet: "#8B5CF6",
                        violet2: "#A78BFA",
                        cyan: "#22D3EE",
                        rose: "#FB7185",
                        lime: "#A3E635",
                    },
                    fontFamily: {
                        display: ["Manrope", "Noto Sans TC", "sans-serif"],
                        body: ["Noto Sans TC", "Manrope", "sans-serif"],
                        serif: ["Playfair Display", "Noto Serif TC", "serif"],
                    },
                    boxShadow: {
                        glass: "0 14px 44px rgba(0,0,0,0.35)",
                        glow: "0 0 18px rgba(139,92,246,0.22)",
                        gold: "0 0 18px rgba(212,175,55,0.18)",
                    },
                    animation: {
                        'fadeIn': 'fadeIn .18s ease-out forwards',
                        'slideUp': 'slideUp .25s ease-out forwards',
                        'popMove': 'popMove 1.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            'from': { opacity: 0, transform: 'translateY(6px)' },
                            'to': { opacity: 1, transform: 'translateY(0)' },
                        },
                        slideUp: {
                            '0%': { opacity: 0, transform: 'translateY(100%)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        popMove: {
                            '0%': { opacity: 0, transform: 'translate(-50%, -50%) scale(.92)' },
                            '18%': { opacity: 1, transform: 'translate(-50%, -58%) scale(1.02)' },
                            '100%': { opacity: 0, transform: 'translate(-50%, -94%) scale(1.0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root{ color-scheme: dark; }

        html{ font-size: 17px; }               
        @media (max-width: 390px){ html{ font-size: 16.5px; } }
        @media (min-width: 430px){ html{ font-size: 18px; } }

        body{
            min-height: 100dvh; background: #05060A; -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            font-family: "Noto Sans TC", Manrope, sans-serif; line-height: 1.35; color: #f1f5f9;
        }

        .ms { 
            font-family: 'Material Symbols Outlined', sans-serif; 
            font-variation-settings: 'FILL' 0, 'wght' 420, 'GRAD' 0, 'opsz' 24;
            font-style: normal; font-weight: normal; text-transform: none;
            letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr;
            -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
            -webkit-font-feature-settings: 'liga' 1; font-feature-settings: 'liga' 1;
        }
        .ms.fill { font-variation-settings: 'FILL' 1, 'wght' 520, 'GRAD' 0, 'opsz' 24; }

        .glass {
            background: rgba(16,25,46,0.58); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10);
        }
        .glass2 {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.10);
        }
        .glass-sheet {
            background: rgba(20, 25, 35, 0.85); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-top: 1px solid rgba(255,255,255,0.2); box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .chip {
            display: inline-flex; align-items: center; gap: .42rem;
            padding: .28rem .62rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.11);
            background: rgba(255,255,255,0.045); font-size: 11px; font-weight: 900;
            color: rgba(226,232,240,0.92); letter-spacing: .08em; text-transform: uppercase; user-select: none; white-space: nowrap;
        }
        .chip .ms { font-size: 16px; }

        .popBadge {
            padding: .30rem .58rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15,20,36,0.78); font-weight: 950; letter-spacing: .08em; font-size: 13px;
        }

        .pb-safe { padding-bottom: calc(6.2rem + env(safe-area-inset-bottom)); }
        .nav-safe { padding-bottom: calc(1.0rem + env(safe-area-inset-bottom)); }

        .noise {
            opacity: 0.045;
            background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 240 240%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.75%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');
        }

        button, a { touch-action: manipulation; }
        .tap44 { min-height: 44px; min-width: 44px; }
        .app-container { max-width: 440px; margin: 0 auto; min-height: 100vh; position: relative; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef, useMemo, useCallback } = React;
        const { MemoryRouter, Routes, Route, useNavigate, useLocation } = ReactRouterDOM;

        const AppContext = createContext();

        const LEVELS = [
            { level: 1, title: '覺醒者 (Awakened)', minXp: 0 },
            { level: 2, title: '探索者 (Seeker)', minXp: 500 },
            { level: 3, title: '進化者 (Evolver)', minXp: 1200 },
            { level: 4, title: '超凡者 (Transcendent)', minXp: 2500 },
            { level: 5, title: '星辰領航員 (Stellar Navigator)', minXp: 5000 },
        ];

        const TASKS = {
            water: { category: 'body', xp: 10 }, 
            squats: { category: 'body', xp: 50, duration: 10 * 60 },
            stretch: { category: 'body', xp: 50, duration: 10 * 60 },
            muscle: { category: 'body', xp: 150, duration: 30 * 60 },
            poop: { category: 'body', xp: 30 },
            m1_protein: { category: 'body', xp: 15 },
            m1_fiber: { category: 'body', xp: 15 },
            m2_protein: { category: 'body', xp: 15 },
            m2_fiber: { category: 'body', xp: 15 },
            reading: { category: 'mind', xp: 100, duration: 20 * 60 },
            skill: { category: 'mind', xp: 80, duration: 15 * 60 },
            review: { category: 'mind', xp: 60 },
            strategy: { category: 'mind', xp: 60 }, 
            gratitude: { category: 'mind', xp: 50 },
            devotion: { category: 'spirit', xp: 50, duration: 10 * 60 },
            verse: { category: 'spirit', xp: 40 },
            healing: { category: 'spirit', xp: 40 }
        };

        const TASK_NAMES = {
            water: '水分 Hydration', squats: '深蹲 Squats', stretch: '拉筋 Stretch', muscle: '肌肉訓練 Workout', poop: '排便 Digestion',
            m1_protein: '一餐蛋白 M1 Pro', m1_fiber: '一餐纖維 M1 Fib', m2_protein: '二餐蛋白 M2 Pro', m2_fiber: '二餐纖維 M2 Fib',
            reading: '閱讀 Reading', skill: '技能 Skill', review: '復盤 Review', strategy: '策略 Strategy', gratitude: '感恩 Gratitude',
            devotion: '靈修 Devotion', verse: '經文 Verse', healing: '修復 Healing'
        };

        const VERSES = [
            { text: "For God has not given us a spirit of fear, but of power and of love and of a sound mind.", ref: "2 Timothy 1:7" },
            { text: "I can do all things through Christ who strengthens me.", ref: "Philippians 4:13" },
            { text: "Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.", ref: "Joshua 1:9" },
            { text: "But the fruit of the Spirit is love, joy, peace, forbearance, kindness, goodness, faithfulness, gentleness and self-control.", ref: "Galatians 5:22-23" },
            { text: "Let all that you do be done in love.", ref: "1 Corinthians 16:14" },
            { text: "Trust in the Lord with all your heart and lean not on your own understanding.", ref: "Proverbs 3:5" },
            { text: "Come to me, all you who are weary and burdened, and I will give you rest.", ref: "Matthew 11:28" }
        ];

        const getTodayString = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        const getVerseForDate = (dateStr) => {
            if (!dateStr) return VERSES[0];
            const sum = dateStr.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            return VERSES[sum % VERSES.length];
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error: error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-10 text-white text-center flex flex-col items-center justify-center min-h-screen">
                            <span className="ms text-[48px] text-rose mb-4">warning</span>
                            <h1 className="text-white font-bold mb-4">系統重整中</h1>
                            <p className="text-xs text-slate-500 mb-6 px-4">{this.state.error && this.state.error.toString()}</p>
                            <button onClick={() => window.location.reload()} className="px-6 py-3 bg-white/10 rounded-xl font-bold active:scale-95 transition-transform">點擊刷新</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const AppProvider = ({ children }) => {
            // 版本號推進，確保快取更新
            const STORAGE_KEY = 'ATE_APP_DATA_PROD_V5';

            const loadInitialState = () => {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    return data ? JSON.parse(data) : {};
                } catch (e) {
                    return {};
                }
            };

            const savedState = loadInitialState();

            const [profile, setProfile] = useState(savedState.profile || { name: 'Aether', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=D4AF37' });
            const [xp, setXp] = useState(savedState.xp || 0); 
            const [streak, setStreak] = useState(savedState.streak || 0);
            const [logs, setLogs] = useState(savedState.logs || {});
            const [timers, setTimers] = useState(savedState.timers || {});
            
            const [toasts, setToasts] = useState([]);
            const [activeDate, setActiveDate] = useState(getTodayString());
            const [sttLang, setSttLang] = useState('AUTO'); 
            const [surpriseQuest, setSurpriseQuest] = useState(null);

            // 暴露出去給底層文字框緊急存檔用的 Ref
            const stateRef = useRef({ profile, xp, streak, logs, timers });

            // 確保當天有紀錄結構
            useEffect(() => {
                if (!logs[activeDate]) {
                    setLogs(prev => ({
                        ...prev,
                        [activeDate]: {
                            water: 0, squats: false, stretch: false, muscle: false, poop: null,
                            m1_protein: 0, m1_fiber: 0, m2_protein: 0, m2_fiber: 0,
                            reading: false, skill: false, review: '', strategy: '', gratitude: '',
                            devotion: false, verse: '', healing: ''
                        }
                    }));
                }
            }, [activeDate, logs]);

            // React 狀態同步到 Ref 與 LocalStorage
            useEffect(() => {
                const currentState = { profile, xp, streak, logs, timers };
                stateRef.current = currentState;
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState));
                } catch (e) {
                    console.error("Local Storage 儲存失敗", e);
                }
            }, [profile, xp, streak, logs, timers]);

            // 全局防殺後台保護
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'hidden') {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(stateRef.current));
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                window.addEventListener("pagehide", handleVisibilityChange);
                
                return () => {
                    document.removeEventListener("visibilitychange", handleVisibilityChange);
                    window.removeEventListener("pagehide", handleVisibilityChange);
                };
            }, []);

            const levelInfo = useMemo(() => {
                let current = LEVELS[0];
                let next = LEVELS[1];
                for (let i = 0; i < LEVELS.length; i++) {
                    if (xp >= LEVELS[i].minXp) {
                        current = LEVELS[i];
                        next = LEVELS[i + 1] || LEVELS[i];
                    }
                }
                const progress = next.minXp > current.minXp ? ((xp - current.minXp) / (next.minXp - current.minXp)) * 100 : 100;
                return { ...current, next, progress, currentXpInLevel: xp - current.minXp, totalXpForNext: next.minXp - current.minXp };
            }, [xp]);

            const triggerToast = useCallback((amount, text) => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, amount, text }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 1500);
            }, []);

            const updateTask = useCallback((date, taskKey, value) => {
                setLogs(prevLogs => {
                    const dayLog = prevLogs[date] || {};
                    const oldValue = dayLog[taskKey];
                    let xpChange = 0;
                    
                    const dietKeys = ['m1_protein', 'm1_fiber', 'm2_protein', 'm2_fiber'];

                    if (typeof value === 'boolean') {
                        if (value && !oldValue) xpChange = TASKS[taskKey].xp;
                        else if (!value && oldValue) xpChange = -TASKS[taskKey].xp;
                    } else if (taskKey === 'water') {
                        const diff = value - (oldValue || 0);
                        xpChange = (diff / 250) * TASKS.water.xp;
                    } else if (dietKeys.includes(taskKey)) {
                        const diff = value - (oldValue || 0);
                        xpChange = diff * TASKS[taskKey].xp;
                    } else if (typeof value === 'string') {
                        const isNowValid = value && value.trim() !== '';
                        const wasValid = oldValue && oldValue.trim() !== '';
                        if (isNowValid && !wasValid) xpChange = TASKS[taskKey].xp;
                        else if (!isNowValid && wasValid) xpChange = -TASKS[taskKey].xp;
                    } else if (taskKey === 'poop') {
                        if (value && !oldValue) xpChange = TASKS.poop.xp;
                        else if (!value && oldValue) xpChange = -TASKS.poop.xp;
                    }

                    if (xpChange !== 0) {
                        setXp(currentXp => Math.max(0, currentXp + xpChange));
                        const actionText = xpChange > 0 ? '獲得' : '扣除';
                        const portionText = dietKeys.includes(taskKey) ? ' 份' : '';
                        const shortName = TASK_NAMES[taskKey] ? TASK_NAMES[taskKey].split(' ')[0] : taskKey; 
                        triggerToast(xpChange, `${actionText} ${shortName}${portionText}`);
                    }

                    return { ...prevLogs, [date]: { ...dayLog, [taskKey]: value } };
                });
            }, [triggerToast]);

            // Global Timer Thread
            const timersRef = useRef(timers);
            const updateTaskRef = useRef(updateTask);

            useEffect(() => { timersRef.current = timers; }, [timers]);
            useEffect(() => { updateTaskRef.current = updateTask; }, [updateTask]);

            useEffect(() => {
                const intervalId = setInterval(() => {
                    let hasChanges = false;
                    const nextTimers = { ...timersRef.current };
                    
                    for (const key in nextTimers) {
                        const t = nextTimers[key];
                        if (t.isRunning && t.timeLeft > 0) {
                            nextTimers[key] = { ...t, timeLeft: t.timeLeft - 1 };
                            hasChanges = true;
                        } else if (t.isRunning && t.timeLeft <= 0) {
                            nextTimers[key] = { ...t, isRunning: false, timeLeft: 0 };
                            hasChanges = true;
                            const parts = key.split('|');
                            if (parts.length === 2) {
                                updateTaskRef.current(parts[0], parts[1], true);
                            }
                        }
                    }
                    if (hasChanges) setTimers(nextTimers);
                }, 1000);
                return () => clearInterval(intervalId);
            }, []);

            const getProgress = useCallback((date) => {
                const log = logs[date] || {};
                const checkString = (val) => val && val.trim() !== '';
                
                let bodyCount = 0;
                bodyCount += Math.min((log.water || 0) / 2000, 1);
                
                if (log.squats) bodyCount++;
                if (log.stretch) bodyCount++;
                if (log.muscle) bodyCount++;
                if (log.poop) bodyCount++;
                if ((log.m1_protein || 0) > 0) bodyCount++; 
                if ((log.m1_fiber || 0) > 0) bodyCount++; 
                if ((log.m2_protein || 0) > 0) bodyCount++; 
                if ((log.m2_fiber || 0) > 0) bodyCount++; 
                
                let mindCount = 0;
                if (log.reading) mindCount++;
                if (log.skill) mindCount++;
                if (checkString(log.review)) mindCount++;
                if (checkString(log.strategy)) mindCount++; 
                if (checkString(log.gratitude)) mindCount++;

                let spiritCount = 0;
                if (log.devotion) spiritCount++;
                if (checkString(log.verse)) spiritCount++;
                if (checkString(log.healing)) spiritCount++;

                const totalCompleted = bodyCount + mindCount + spiritCount;
                
                return {
                    body: Math.round((bodyCount / 9) * 100),
                    mind: Math.round((mindCount / 5) * 100), 
                    spirit: Math.round((spiritCount / 3) * 100),
                    overall: Math.round((totalCompleted / 17) * 100),
                    bodyCount,
                    mindCount,
                    spiritCount
                };
            }, [logs]);

            // Strict Streak Logic
            useEffect(() => {
                let currentStreak = 0;
                let graceUsed = false;
                const d = new Date();
                d.setHours(0,0,0,0);
                
                for (let i = 0; i < 365; i++) {
                    const checkDate = new Date(d);
                    checkDate.setDate(checkDate.getDate() - i);
                    const dateStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
                    
                    const prog = getProgress(dateStr);
                    const isCompleted = prog.bodyCount > 0 && prog.mindCount > 0 && prog.spiritCount > 0;
                    
                    if (isCompleted) { 
                        currentStreak++;
                        graceUsed = false; 
                    } else {
                        if (i === 0) continue; 
                        else if (!graceUsed) graceUsed = true; 
                        else break;
                    }
                }
                setStreak(currentStreak);
            }, [logs, getProgress]);

            useEffect(() => {
                if (Math.random() < 0.15 && !surpriseQuest) {
                    setTimeout(() => {
                        setSurpriseQuest({
                            title: '隱藏的恩典 Secret Grace',
                            desc: '此刻放下手機，深呼吸 1 分鐘，領受雙倍祝福！',
                            xp: 150
                        });
                    }, 3500);
                }
            }, []);

            return (
                <AppContext.Provider value={{ 
                    profile, setProfile, xp, setXp, levelInfo, streak, 
                    logs, activeDate, setActiveDate, updateTask, getProgress, getTodayString,
                    sttLang, setSttLang, getVerseForDate, timers, setTimers, stateRef
                }}>
                    <div className="app-container">
                        <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                            <div className="absolute -top-[18%] left-[12%] w-[95%] h-[55%] bg-violet/18 rounded-full blur-[130px]"></div>
                            <div className="absolute -bottom-[18%] right-[-12%] w-[70%] h-[45%] bg-cyan/10 rounded-full blur-[120px]"></div>
                            <div className="absolute inset-0 noise"></div>
                        </div>

                        {children}
                        
                        {/* XP Toasts */}
                        {toasts.map(toast => (
                            <div key={toast.id} className="fixed left-1/2 top-[44%] z-[9999] pointer-events-none flex flex-col items-center justify-center -translate-x-1/2 -translate-y-1/2 animate-popMove font-display drop-shadow-[0_8px_16px_rgba(0,0,0,0.45)]">
                                <div className={`text-[36px] font-black ${toast.amount > 0 ? 'text-lime' : 'text-rose'}`}>
                                    {toast.amount > 0 ? '+' : ''}{toast.amount}
                                </div>
                                <div className="mt-1 popBadge text-white whitespace-nowrap">
                                    {toast.text}
                                </div>
                            </div>
                        ))}

                        {/* Surprise Quest Modal */}
                        {surpriseQuest && (
                            <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 animate-fadeIn">
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setSurpriseQuest(null)}></div>
                                <div className="relative glass rounded-2xl p-6 text-center shadow-glass max-w-sm w-full border border-gold/40 z-10">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gold via-gold2 to-gold"></div>
                                    <span className="ms fill text-5xl text-gold mb-3 drop-shadow-[0_0_15px_rgba(212,175,55,0.8)]">auto_awesome</span>
                                    <h3 className="text-[18px] font-display font-black text-white mb-2 tracking-wide">{surpriseQuest.title}</h3>
                                    <p className="text-slate-300 text-[13px] mb-6 leading-relaxed">{surpriseQuest.desc}</p>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => setSurpriseQuest(null)} className="tap44 glass2 border border-white/10 rounded-xl text-[13px] font-black text-white active:scale-95 transition-transform">稍後再說 Skip</button>
                                        <button onClick={() => {
                                            setXp(x => x + surpriseQuest.xp);
                                            triggerToast(surpriseQuest.xp, "完成挑戰");
                                            setSurpriseQuest(null);

            const { sttLang, setSttLang, stateRef, activeDate } = useAppContext();
            const [isRecording, setIsRecording] = useState(false);
            const [isLangSheetOpen, setIsLangSheetOpen] = useState(false);
            
            const recognitionRef = useRef(null);
            
            // 使用 localVal 保證中文輸入法 (IME) 不會被 React 強制刷新打斷
            const [localVal, setLocalVal] = useState(value || '');
            const latestVal = useRef(value || '');

            useEffect(() => {
                setLocalVal(value || '');
                latestVal.current = value || '';
            }, [value]);

            const handleChange = (e) => {
                setLocalVal(e.target.value);
                latestVal.current = e.target.value;
            };

            const handleBlur = () => {
                if (latestVal.current !== value) {
                    onChange(latestVal.current);
                }
            };

            // ⚠️ 極致防殺後台：如果使用者正在打字，直接滑掉 App，此監聽器會硬寫入 LocalStorage
            useEffect(() => {
                const handleHide = () => {
                    if (latestVal.current !== value) {
                        onChange(latestVal.current); 
                        if (stateRef && stateRef.current) {
                            const currentLogs = stateRef.current.logs;
                            const dayLog = currentLogs[activeDate] || {};
                            const newLogs = { ...currentLogs, [activeDate]: { ...dayLog, [taskKey]: latestVal.current } };
                            const newState = { ...stateRef.current, logs: newLogs };
                            localStorage.setItem('ATE_APP_DATA_PROD_V5', JSON.stringify(newState));
                        }
                    }
                };
                window.addEventListener('pagehide', handleHide);
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'hidden') handleHide();
                });
                return () => {
                    window.removeEventListener('pagehide', handleHide);
                    document.removeEventListener('visibilitychange', handleHide); 
                }
            }, [activeDate, taskKey, value, onChange, stateRef]);

            useEffect(() => {
                if ('webkitSpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    
                    const langMap = { 'AUTO': 'zh-HK', 'EN': 'en-US', 'ZH': 'zh-TW', 'YUE': 'yue-Hant-HK' };
                    recognition.lang = langMap[sttLang] || 'zh-HK';

                    recognition.onresult = (event) => {
                        let finalTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                        }
                        if (finalTranscript) {
                            const currentVal = latestVal.current;
                            const newVal = (currentVal ? currentVal + ' ' : '') + finalTranscript.trim();
                            setLocalVal(newVal);
                            latestVal.current = newVal;
                            onChange(newVal); // 語音結束直接入庫
                        }
                    };
                    
                    recognition.onend = () => setIsRecording(false);
                    recognition.onerror = () => setIsRecording(false);

                    recognitionRef.current = recognition;
                }

                return () => {
                    if (recognitionRef.current) {
                        try { recognitionRef.current.abort(); } catch(e){}
                    }
                };
            }, [sttLang, onChange]); 

            const toggleRecord = () => {
                if (!recognitionRef.current) {
                    alert("您的瀏覽器不支援語音辨識功能，請使用鍵盤輸入。\nVoice dictation not supported in this browser.");
                    return;
                }
                if (isRecording) {
                    try { recognitionRef.current.stop(); } catch(e){}
                    setIsRecording(false);
                } else {
                    try { 
                        recognitionRef.current.start();

                            </button>
                        </div>
                        <textarea 
                            value={localVal} 
                            onChange={handleChange}
                            onBlur={handleBlur}

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 256; // 限制最大寬高，避免撐爆 LocalStorage
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_SIZE) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                }
                            } else {
                                if (height > MAX_SIZE) {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // 壓縮成品質 0.7 的 JPEG，將幾 MB 的照片縮小到不到 20KB
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            setTempAvatar(compressedDataUrl);
                        };
                        img.src = event.target.result;

                    URL.revokeObjectURL(url);

                }

                            <div className="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-gradient-to-r from-violet via-violet2 to-cyan rounded-full shadow-glow transition-all duration-300 ease-out" 
                                 style={{ left: tab === 'mind' ? '4px' : 'calc(50%)' }}></div>
                            <button onClick={() => setTab('mind')} className={`flex-1 relative z-10 py-2 text-[13px] font-black text-center rounded-full transition-colors ${tab==='mind' ? 'text-white' : 'text-slate-400'}`}>心智 Mind</button>
                            <button onClick={() => setTab('spirit')} className={`flex-1 relative z-10 py-2 text-[13px] font-black text-center rounded-full transition-colors ${tab==='spirit' ? 'text-white' : 'text-slate-400'}`}>靈修 Spirit</button>
                        </div>
                    </header>

                    <main className="px-4 pb-safe flex-1 relative z-10 overflow-y-auto no-scrollbar">
                        {tab === 'mind' ? (
                            <div key="mind-tab" className="space-y-3 animate-fadeIn">
                                <InlineTaskCard key={`reading-${activeDate}`} taskKey="reading" title="深度閱讀 Deep Reading" icon="menu_book" themeColor="violet2" />
                                <InlineTaskCard key={`skill-${activeDate}`} taskKey="skill" title="新技能學習 Skill Learning" icon="lightbulb" themeColor="violet2" />
                                
                                <VoiceTextarea 
                                    key={`review-${activeDate}`}
                                    taskKey="review" icon="rate_review"
                                    value={log.review || ''} onChange={(val) => updateTask(activeDate, 'review', val)}
                                    title="今日復盤 Daily Review"
                                    placeholder="學到了什麼？有什麼可以改善？(支援中英粵混講)" 
                                    isDone={!!(log.review && log.review.trim())} />

                                <VoiceTextarea 
                                    key={`strategy-${activeDate}`}
                                    taskKey="strategy" icon="note_alt"
                                    value={log.strategy || ''} onChange={(val) => updateTask(activeDate, 'strategy', val)}
                                    title="策略筆記 Strategy Notes"
                                    placeholder="記下一個重點思路！(支援中英粵混講)" 
                                    isDone={!!(log.strategy && log.strategy.trim())} />

                                <SimpleTextarea 
                                    key={`gratitude-${activeDate}`}
                                    taskKey="gratitude"
                                    value={log.gratitude || ''} onChange={(val) => updateTask(activeDate, 'gratitude', val)}
                                    title="感恩日記 Gratitude Journal" icon="favorite" themeColor="violet2"
                                    placeholder="寫下一件值得感恩的小事..." 
                                    isDone={!!(log.gratitude && log.gratitude.trim())} />
                            </div>
                        ) : (
                            <div key="spirit-tab" className="space-y-3 animate-fadeIn">
                                <InlineTaskCard key={`devotion-${activeDate}`} taskKey="devotion" title="靜心靈修 Devotion" icon="self_improvement" themeColor="cyan" />

                                <SimpleTextarea 
                                    key={`verse-${activeDate}`}
                                    taskKey="verse"
                                    value={log.verse || ''} onChange={(val) => updateTask(activeDate, 'verse', val)}
                                    title="經文與領受 Bible Verse" icon="auto_stories" themeColor="cyan"
                                    placeholder="紀錄感動的經節與靈感..." 
                                    isDone={!!(log.verse && log.verse.trim())} />
                                    
                                <SimpleTextarea 
                                    key={`healing-${activeDate}`}
                                    taskKey="healing"
                                    value={log.healing || ''} onChange={(val) => updateTask(activeDate, 'healing', val)}
                                    title="自我啟發與修復 Self-Healing" icon="flare" themeColor="cyan"
                                    placeholder="釋放重擔，給自己一句鼓勵的話..." 
                                    isDone={!!(log.healing && log.healing.trim())} />
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const CalendarPage = () => {
            const { getTodayString, activeDate, setActiveDate, getProgress, logs } = useAppContext();
            const navigate = useNavigate();
            const todayStr = getTodayString();
            
            const [viewDate, setViewDate] = useState(todayStr); 
            const displayDateObj = new Date(viewDate);
            
            const [currentMonthDate, setCurrentMonthDate] = useState(new Date(displayDateObj.getFullYear(), displayDateObj.getMonth(), 1));
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const days = [];
            for(let i=0; i<firstDay; i++) days.push(null);
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                days.push({ day: i, dateStr });
            }

            const prevMonth = () => setCurrentMonthDate(new Date(year, month - 1, 1));
            const nextMonth = () => setCurrentMonthDate(new Date(year, month + 1, 1));

            const log = logs[viewDate] || {};
            const prog = getProgress(viewDate);

            // 展開/收合狀態管理
            const [expanded, setExpanded] = useState({ rose: true, violet: true, cyan: true });
            const toggleExpand = (theme) => setExpanded(prev => ({...prev, [theme]: !prev[theme]}));

            const bodyTasks = ['diet1', 'diet2', 'water', 'squats', 'stretch', 'muscle', 'poop'];
            const mindTasks = ['reading', 'skill', 'review', 'strategy', 'gratitude'];
            const spiritTasks = ['devotion', 'verse', 'healing'];

            const renderTaskGroup = (title, iconName, taskKeys, progressPercent, colorTheme) => {
                const colorMap = {
                    rose: { text: 'text-rose', border: 'border-rose/30', bg: 'bg-rose/10', iconColor: 'text-rose' },
                    violet: { text: 'text-violet2', border: 'border-violet2/30', bg: 'bg-violet2/10', iconColor: 'text-violet2' },
                    cyan: { text: 'text-cyan', border: 'border-cyan/30', bg: 'bg-cyan/10', iconColor: 'text-cyan' }
                };
                const theme = colorMap[colorTheme];
                const isExpanded = expanded[colorTheme];

                // 篩選出「有完成」或「有填寫」的項目 (唯讀模式)
                const completedKeys = taskKeys.filter(key => {
                    if (key === 'diet1') return ((log.m1_protein||0) > 0 || (log.m1_fiber||0) > 0);
                    if (key === 'diet2') return ((log.m2_protein||0) > 0 || (log.m2_fiber||0) > 0);
                    if (key === 'water') return ((log.water || 0) > 0);
                    
                    const isTextTask = ['review', 'strategy', 'gratitude', 'verse', 'healing'].includes(key);
                    if (isTextTask) return (log[key] && log[key].trim() !== '');
                    return !!log[key];
                });

                return (
                    <div className="mb-4 last:mb-0 glass2 rounded-2xl border border-white/10 overflow-hidden shadow-glass transition-all">
                        {/* 手風琴頂部 */}
                        <div className="flex items-center justify-between p-3.5 bg-white/5 hover:bg-white/10 cursor-pointer transition-colors"
                             onClick={() => toggleExpand(colorTheme)}>
                            <div className="flex items-center gap-2">
                                <span className={`ms fill text-[18px] ${theme.iconColor}`}>{iconName}</span>
                                <div className="text-[13px] font-black tracking-widest text-white">{title}</div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className={`text-[13px] font-mono font-black ${theme.iconColor}`}>{progressPercent}%</div>
                                <span className="ms text-slate-400 text-[20px]">{isExpanded ? 'expand_less' : 'expand_more'}</span>
                            </div>
                        </div>
                        
                        {/* 展開的內容 */}
                        {isExpanded && (
                            <div className="p-3 pt-2 border-t border-white/5">
                                {completedKeys.length === 0 ? (
                                    <div className="text-[11px] text-slate-500 italic text-center py-3">此區塊尚無紀錄 No records yet</div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-2">
                                        {completedKeys.map(key => {
                                            const isTextTask = ['review', 'strategy', 'gratitude', 'verse', 'healing'].includes(key);
                                            const isDietTask = ['diet1', 'diet2'].includes(key);
                                            const isWaterTask = key === 'water';
                                            const baseColor = `${theme.text} ${theme.border} ${theme.bg}`;

                                            if (isDietTask) {
                                                const isM1 = key === 'diet1';
                                                const protein = isM1 ? (log.m1_protein||0) : (log.m2_protein||0);
                                                const fiber = isM1 ? (log.m1_fiber||0) : (log.m2_fiber||0);
                                                return (
                                                    <div key={key} className={`col-span-1 flex flex-col justify-center p-2.5 rounded-xl border ${baseColor}`}>
                                                        <div className="flex items-center gap-1.5 mb-1 text-[11px] font-bold">
                                                            <span className="ms text-[14px] fill">restaurant</span>
                                                            <span>{isM1 ? '第一餐 M1' : '第二餐 M2'}</span>
                                                        </div>
                                                        <div className="text-[11px] font-mono font-semibold ml-5 opacity-90">蛋:{protein} 纖:{fiber}</div>
                                                    </div>
                                                );
                                            }

                                            if (isTextTask) {
                                                return (
                                                    <div key={key} className={`col-span-2 flex flex-col p-3 rounded-xl border ${baseColor}`}>
                                                        <div className="flex items-center gap-1.5 mb-1.5 text-[12px] font-bold">
                                                            <span className="ms text-[16px] fill">check_circle</span>
                                                            <span>{TASK_NAMES[key]}</span>
                                                        </div>
                                                        <div className="text-[12.5px] leading-relaxed text-slate-200 ml-[22px] whitespace-pre-wrap break-words">{log[key]}</div>
                                                    </div>
                                                );
                                            }

                                            return (
                                                <div key={key} className={`col-span-1 flex flex-col justify-center p-2.5 rounded-xl border ${baseColor}`}>
                                                    <div className="flex items-center gap-1.5 text-[11px] font-bold">
                                                        <span className="ms text-[14px] fill">check_circle</span>
                                                        <span className="truncate">{TASK_NAMES[key].split(' ')[0]}</span>
                                                    </div>
                                                    {isWaterTask && <div className="text-[11px] font-mono font-semibold ml-5 mt-0.5 opacity-90">{log.water} ml</div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="flex flex-col flex-1 animate-fadeIn">
                    <TopDateBar />
                    <header className="px-4 pb-1 relative z-10">
                        <div className="text-[11px] tracking-[0.22em] uppercase font-extrabold text-cyan">Evolution History</div>
                        <div className="mt-0.5 text-[20px] font-black text-white">日曆回顧</div>
                    </header>

                    <main className="px-4 pb-safe flex-1 relative z-10 overflow-y-auto no-scrollbar">
                        
                        <div className="glass rounded-2xl p-4 shadow-glass mt-2">
                            <div className="flex items-center justify-between mb-4">
                                <button onClick={prevMonth} className="tap44 glass2 border border-white/10 rounded-full w-10 h-10 flex items-center justify-center active:scale-95 text-slate-300">
                                    <span className="ms text-[18px]">chevron_left</span>
                                </button>
                                <div className="text-[15px] font-black text-white tracking-widest">{year} / {String(month + 1).padStart(2, '0')}</div>
                                <button onClick={nextMonth} className="tap44 glass2 border border-white/10 rounded-full w-10 h-10 flex items-center justify-center active:scale-95 text-slate-300">
                                    <span className="ms text-[18px]">chevron_right</span>
                                </button>
                            </div>

                            <div className="grid grid-cols-7 gap-1.5 text-center mb-2">
                                {['日','一','二','三','四','五','六'].map((d,i) => (
                                    <div key={i} className="text-[11px] text-slate-400 font-extrabold py-1">{d}</div>
                                ))}
                                
                                {days.map((d, i) => {
                                    if (!d) return <div key={`empty-${i}`}></div>;
                                    
                                    const dProg = getProgress(d.dateStr).overall;
                                    const isFuture = d.dateStr > todayStr;
                                    const isSelected = d.dateStr === viewDate;
                                    const isCurrentToday = d.dateStr === todayStr;
                                    
                                    let bgClass = "bg-transparent text-slate-300 hover:bg-white/5 border border-transparent";
                                    if (isSelected) bgClass = "bg-gradient-to-br from-violet via-violet2 to-cyan text-white font-black shadow-glow border-white/20";
                                    else if (dProg >= 70) bgClass = "bg-white/10 text-lime border-lime/30 font-bold";
                                    else if (dProg > 0) bgClass = "bg-white/5 text-gold border-gold/20 font-bold";
                                    else if (isFuture) bgClass = "opacity-20 pointer-events-none text-slate-600";

                                    return (
                                        <div key={i} onClick={() => !isFuture && setViewDate(d.dateStr)}
                                             className={`aspect-square rounded-full flex flex-col items-center justify-center relative cursor-pointer transition-all active:scale-90 ${bgClass} ${isCurrentToday && !isSelected ? 'ring-2 ring-cyan/50 ring-offset-1 ring-offset-ink' : ''}`}>
                                            <span className="text-[13px]">{d.day}</span>
                                        </div>
                                    )
                                })}
                            </div>
                            
                            <div className="mt-4 flex items-center justify-center gap-4 text-[10px] text-slate-400 font-extrabold uppercase tracking-widest">
                                <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-lime border border-lime/50"></span> 70%+</div>
                                <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-gold border border-gold/50"></span> 部分</div>
                            </div>
                        </div>

                        {/* Read-Only Summary with Collapse/Expand and 2-Column Grid */}
                        <div className="mt-4 pb-2 animate-slideUp">
                            <div className="flex justify-between items-end mb-4 px-2">
                                <div>
                                    <div className="text-[11px] tracking-widest uppercase text-slate-400 font-extrabold">Summary</div>
                                    <div className="text-[15px] font-black text-white mt-0.5">{viewDate} <span className="text-[12px] text-slate-400 font-semibold ml-1">摘要</span></div>
                                </div>
                                <span className="chip"><span className="ms fill text-gold">stars</span><span>總達成 {prog.overall}%</span></span>
                            </div>

                            {/* Sectioned Task Groups */}
                            {renderTaskGroup('身體 Body', 'fitness_center', bodyTasks, prog.body, 'rose')}
                            {renderTaskGroup('心智 Mind', 'psychology', mindTasks, prog.mind, 'violet')}
                            {renderTaskGroup('靈修 Spirit', 'spa', spiritTasks, prog.spirit, 'cyan')}

                            {/* 補登按鈕 */}
                            {viewDate !== activeDate && (
                                <button onClick={() => { setActiveDate(viewDate); navigate('/'); }} className="mt-6 w-full tap44 rounded-xl font-black text-white bg-gradient-to-r from-violet via-violet2 to-cyan shadow-glow active:scale-95 transition-transform text-[14px] flex items-center justify-center gap-2">
                                    <span className="ms text-[18px]">edit_calendar</span>
                                    前往 {viewDate} 補登紀錄 
                                </button>
                            )}
                        </div>

                    </main>
                </div>
            );
        };

        // --- App Wrapper ---
        const App = () => {
            return (
                <ErrorBoundary>
                    <AppProvider>
                        <MemoryRouter>
                            <Routes>
                                <Route path="/" element={<DashboardPage />} />
                                <Route path="/body" element={<BodyPage />} />
                                <Route path="/mind" element={<MindPage />} />
                                <Route path="/calendar" element={<CalendarPage />} />
                            </Routes>
                            <BottomNav />
                        </MemoryRouter>
                    </AppProvider>
                </ErrorBoundary>
            );
        };

        const rootElement = document.getElementById('root');
        if (ReactDOM.createRoot) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } else {
            ReactDOM.render(<App />, rootElement);
        }
    </script>
</body>
</html>
